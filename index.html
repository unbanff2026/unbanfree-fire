<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>Painel Unban Free Fire</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
overflow-y:auto;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:flex-start;
background:#05010a;
position:relative;
padding:15px;
}

/* FUNDO */

body::before{
content:"";
position:fixed;
width:700px;
height:700px;
background:
radial-gradient(circle,#8a2eff88 0%,transparent 60%),
radial-gradient(circle,#ff00ff44 0%,transparent 70%),
radial-gradient(circle,#4b00ff55 0%,transparent 75%);
filter:blur(90px);
animation:bgRotate 12s linear infinite;
z-index:0;
}

body::after{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(
135deg,
rgba(0,0,0,0.9),
rgba(30,0,60,0.7),
rgba(0,0,0,0.95)
);
z-index:0;
}

/* PARTICULAS */

.particles span{
position:absolute;
width:4px;
height:4px;
background:#b84dff;
border-radius:50%;
box-shadow:0 0 10px #b84dff;
animation:float 10s linear infinite;
}

.particles span:nth-child(1){
top:10%;
left:20%;
animation-duration:8s;
}

.particles span:nth-child(2){
top:70%;
left:80%;
animation-duration:11s;
}

.particles span:nth-child(3){
top:40%;
left:10%;
animation-duration:9s;
}

.particles span:nth-child(4){
top:80%;
left:30%;
animation-duration:13s;
}

.particles span:nth-child(5){
top:20%;
left:70%;
animation-duration:7s;
}

@keyframes float{

0%{
transform:translateY(0px);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-120px);
opacity:0;
}

}

@keyframes bgRotate{

from{
transform:rotate(0deg) scale(1);
}

50%{
transform:rotate(180deg) scale(1.15);
}

to{
transform:rotate(360deg) scale(1);
}

}

/* LOGO */

.logo-bg{
position:fixed;
font-size:60px;
font-weight:bold;
color:rgba(255,255,255,0.03);
text-shadow:
0 0 20px #8a2eff,
0 0 40px #b84dff,
0 0 80px #4b00ff;
animation:spin 20s linear infinite;
z-index:1;
user-select:none;
top:50%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

@keyframes spin{

from{
transform:translate(-50%,-50%) rotate(0deg);
}

to{
transform:translate(-50%,-50%) rotate(360deg);
}

}

/* CONTAINER */

.container{
position:relative;
z-index:2;
width:100%;
max-width:390px;
padding:18px;
border-radius:22px;
background:rgba(10,10,15,0.78);
backdrop-filter:blur(14px);
border:1px solid #8a2eff;
box-shadow:
0 0 25px #8a2eff55,
0 0 60px #4b00ff22;
color:white;
overflow:hidden;
}

/* BRILHO */

.container::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:
linear-gradient(
45deg,
transparent,
rgba(255,255,255,0.03),
transparent
);
transform:rotate(25deg);
animation:shine 6s linear infinite;
}

@keyframes shine{

from{
transform:translateX(-100%) rotate(25deg);
}

to{
transform:translateX(100%) rotate(25deg);
}

}

h1{
text-align:center;
color:#d966ff;
font-size:27px;
text-shadow:
0 0 10px #b84dff,
0 0 25px #8a2eff;
}

.sub{
text-align:center;
margin-top:10px;
color:#ccc;
font-size:12px;
line-height:18px;
}

.box{
margin-top:14px;
padding:14px;
border-radius:16px;
background:rgba(20,20,25,0.9);
border:1px solid #8a2eff55;
}

.box h3{
margin-bottom:10px;
color:#d966ff;
font-size:16px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
outline:none;
font-size:14px;
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
color:white;
background:
linear-gradient(
90deg,
#6f00ff,
#b84dff,
#8a2eff
);
transition:0.25s;
font-size:14px;
}

.btn:hover{
transform:scale(1.02);
box-shadow:
0 0 15px #b84dff,
0 0 30px #8a2eff;
}

.result{
margin-top:10px;
color:#00ff99;
font-weight:bold;
font-size:13px;
word-break:break-word;
}

.status{
margin-top:10px;
color:#ff5555;
font-weight:bold;
font-size:13px;
}

</style>
</head>

<body>

<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="logo-bg">
FREE FIRE
</div>

<div class="container">

<h1>PAINEL UNBAN FREE FIRE</h1>

<p class="sub">
O único painel privado realmente funcionando 🚀<br>
Sistema atualizado com método exclusivo e seguro.
</p>

<!-- LOGIN -->

<div class="box">

<h3>Login Social</h3>

<button class="btn" onclick="login('Facebook')">
Facebook
</button>

<button class="btn" onclick="login('Google')">
Google
</button>

<button class="btn" onclick="login('VK')">
VK
</button>

<p id="loginRes" class="result"></p>

</div>

<!-- BUSCA -->

<div class="box">

<h3>Buscar Conta</h3>

<input id="busca" placeholder="Digite ID ou Nome">

<button class="btn" onclick="buscar()">
Buscar
</button>

<p id="buscaRes" class="result"></p>

</div>

<!-- DEVICE -->

<div class="box">

<h3>Dispositivo</h3>

<select id="device" onchange="device()">

<option disabled selected>
Selecione
</option>

<option>
Android
</option>

<option>
PC
</option>

<option>
iOS
</option>

</select>

<p id="deviceRes" class="result"></p>

</div>

<!-- STATUS -->

<div class="box">

<h3>Status da Conta</h3>

<button class="btn" onclick="statusConta()">
Verificar Status
</button>

<p id="statusRes" class="status">
NÃO VERIFICADO
</p>

</div>

<!-- KEY -->

<div class="box">

<h3>Sistema de Key</h3>

<button class="btn" onclick="keygen()">
Gerar Key
</button>

<p id="keyRes" class="result"></p>

<button class="btn" onclick="confirmar()">
Confirmar Unban
</button>

</div>

</div>

<script>

let user = null;
let key = null;

/* LOGIN */

function login(type){

document.getElementById("loginRes").innerText =
"✔ Login realizado com " + type;

}

/* BUSCAR CONTA */

function buscar(){

let v =
document.getElementById("busca")
.value
.trim();

if(!v){

document.getElementById("buscaRes")
.innerText =
"Digite ID ou Nome";

return;

}

user = {
id:v,
nome:v
};

document.getElementById("buscaRes")
.innerText =
"✔ Conta carregada: " + v;

}

/* DEVICE */

function device(){

let d =
document.getElementById("device")
.value;

document.getElementById("deviceRes")
.innerText =
"✔ Dispositivo: " + d;

}

/* STATUS */

function statusConta(){

if(!user){

alert("Busque uma conta primeiro!");

return;

}

let estados = [
"ATIVA",
"SUSPENSA",
"EM ANÁLISE"
];

let r =
estados[
Math.floor(
Math.random()*estados.length
)
];

document.getElementById("statusRes")
.innerText = r;

}

/* GERAR KEY */

function keygen(){

if(!user){

alert("Busque uma conta primeiro!");

return;

}

key =
"UNBAN-" +
Math.random()
.toString(36)
.substring(2,10)
.toUpperCase();

document.getElementById("keyRes")
.innerText =
"✔ KEY GERADA: " + key;

}

/* CONFIRMAR */

function confirmar(){

if(!key){

alert("Gere uma key primeiro!");

return;

}

document.getElementById("keyRes")
.innerText =
"⏳ Processando solicitação...";

setTimeout(()=>{

alert(
"✔ Solicitação enviada com sucesso!\n\n" +
"Seu pedido foi registrado.\n" +
"O processo de Desbanimento Terminar em torno de 5 dias úteis."
"COM A TAXA ABAIXO O PROCESSO SERÁ MAIS RAPIDO !!!"
"Tempo estimado de análise com a taxa: em até 48 horas.\n" +
"Taxa: R$1,00"
"Solicite a Central em qual você ABAIXOU !!!"
);

document.getElementById("statusRes")
.innerText =
"EM PROCESSAMENTO";

document.getElementById("keyRes")
.innerText =
"✔ Desbanimento solicitado com sucesso";

},1000);

}

</script>

</body>
</html>
