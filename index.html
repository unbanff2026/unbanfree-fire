<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>Painel Unban Free Fire</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
overflow-y:auto;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:flex-start;
background:#05010a;
position:relative;
padding:15px;
}

/* FUNDO */

body::before{
content:"";
position:fixed;
width:700px;
height:700px;
background:
radial-gradient(circle,#8a2eff88 0%,transparent 60%),
radial-gradient(circle,#ff00ff44 0%,transparent 70%),
radial-gradient(circle,#4b00ff55 0%,transparent 75%);
filter:blur(90px);
animation:bgRotate 12s linear infinite;
z-index:0;
}

body::after{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(
135deg,
rgba(0,0,0,0.9),
rgba(30,0,60,0.7),
rgba(0,0,0,0.95)
);
z-index:0;
}

/* PARTICULAS */

.particles span{
position:absolute;
width:4px;
height:4px;
background:#b84dff;
border-radius:50%;
box-shadow:0 0 10px #b84dff;
animation:float 10s linear infinite;
}

.particles span:nth-child(1){
top:10%;
left:20%;
animation-duration:8s;
}

.particles span:nth-child(2){
top:70%;
left:80%;
animation-duration:11s;
}

.particles span:nth-child(3){
top:40%;
left:10%;
animation-duration:9s;
}

.particles span:nth-child(4){
top:80%;
left:30%;
animation-duration:13s;
}

.particles span:nth-child(5){
top:20%;
left:70%;
animation-duration:7s;
}

@keyframes float{

0%{
transform:translateY(0px);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-120px);
opacity:0;
}

}

@keyframes bgRotate{

from{
transform:rotate(0deg) scale(1);
}

50%{
transform:rotate(180deg) scale(1.15);
}

to{
transform:rotate(360deg) scale(1);
}

}

/* LOGO */

.logo-bg{
position:fixed;
font-size:60px;
font-weight:bold;
color:rgba(255,255,255,0.03);
text-shadow:
0 0 20px #8a2eff,
0 0 40px #b84dff,
0 0 80px #4b00ff;
animation:spin 20s linear infinite;
z-index:1;
user-select:none;
top:50%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

@keyframes spin{

from{
transform:translate(-50%,-50%) rotate(0deg);
}

to{
transform:translate(-50%,-50%) rotate(360deg);
}

}

.container{
position:relative;
z-index:2;
width:100%;
max-width:390
